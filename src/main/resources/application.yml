server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: bochocredit-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bochocredit}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgre}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # Flyway controla el esquema; Hibernate solo valida
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Lima
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    time-zone: America/Lima

bochocredit:
  jwt:
    secret: ${JWT_SECRET:8EQ9erCMDArSWcaXnAZ6pcP3BMBPc1HXwM5COQNuWiD}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 horas
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:5173}

logging:
  level:
    com.bochocredit: INFO
    org.springframework.security: WARN


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: method
    tagsSorter: alpha